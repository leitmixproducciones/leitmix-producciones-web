<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Leitmix Producciones</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    padding:20px;
}

h1{
    color:#f5b400;
}

input, button{
    width:100%;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

button{
    background:#f5b400;
    border:0;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>Panel Leitmix Producciones</h1>

<h2>Subir imagen</h2>

<input type="file" accept="image/*">

<input type="text" placeholder="Título de la imagen">

<button>Guardar imagen</button>


<h2>Subir video</h2>

<input type="file" accept="video/*">

<input type="text" placeholder="Título del video">

<button>Guardar video</button>


</body>

</html>
