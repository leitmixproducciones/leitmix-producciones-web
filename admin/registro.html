<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crear cuenta - Leitmix Panel</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050505;
font-family:Arial;
color:white;
}

.registro{
width:90%;
max-width:350px;
background:#111;
padding:25px;
border-radius:15px;
border:1px solid #f5b400;
}

h2{
text-align:center;
color:#f5b400;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
box-sizing:border-box;
}

input{
background:#222;
border:1px solid #444;
color:white;
}

button{
background:#f5b400;
border:0;
font-weight:bold;
}

#mensaje{
text-align:center;
margin-top:15px;
color:#f5b400;
}

</style>

</head>

<body>


<div class="registro">

<h2>Crear cuenta DJ</h2>

<input id="nombre" placeholder="Nombre artístico">

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Contraseña">

<input id="whatsapp" placeholder="WhatsApp">

<input id="ciudad" placeholder="Ciudad">

<button id="crear">
Crear cuenta
</button>

<p id="mensaje"></p>

</div>


<script type="module">

import { supabase } from "../supabase.js";


document.getElementById("crear").onclick = async ()=>{


const nombre = document.getElementById("nombre").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
const whatsapp = document.getElementById("whatsapp").value;
const ciudad = document.getElementById("ciudad").value;


const {data,error} = await supabase.auth.signUp({

email,
password

});


if(error){

document.getElementById("mensaje").textContent = error.message;
return;

}


const user = data.user;


const {error:perfilError} = await supabase
.from("perfiles")
.insert({

id:user.id,
nombre_artistico:nombre,
email,
whatsapp,
ciudad

});


if(perfilError){

document.getElementById("mensaje").textContent = perfilError.message;
return;

}


document.getElementById("mensaje").textContent =
"Cuenta creada correctamente";


};


</script>


</body>
</html>
