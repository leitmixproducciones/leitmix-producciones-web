<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ingreso - Leitmix Panel</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050505;
    font-family:Arial,sans-serif;
    color:white;
}

.login{
    width:90%;
    max-width:350px;
    background:#111;
    padding:25px;
    border-radius:15px;
    border:1px solid #f5b400;
}

h2{
    text-align:center;
    color:#f5b400;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border-radius:8px;
    box-sizing:border-box;
}

input{
    background:#222;
    border:1px solid #444;
    color:white;
}

button{
    background:#f5b400;
    border:0;
    font-weight:bold;
    cursor:pointer;
}

#mensaje{
    text-align:center;
    margin-top:15px;
    color:#f5b400;
}

</style>

</head>

<body>


<div class="login">

<h2>Leitmix Panel</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Contraseña">

<button id="entrar">
Ingresar
</button>

<button id="recuperar" style="background:#222;color:#f5b400;">
Olvidé mi contraseña
</button>

<p id="mensaje"></p>

</div>


<script type="module">

import { supabase } from "../supabase.js";


const boton = document.getElementById("entrar");


boton.onclick = async ()=>{


const email = document.getElementById("email").value.trim();

const password = document.getElementById("password").value.trim();


if(!email || !password){

document.getElementById("mensaje").textContent="Completá email y contraseña";

return;

}



const { data, error } = await supabase.auth.signInWithPassword({

email: email,

password: password

});



if(error){

document.getElementById("mensaje").textContent = error.message;

console.log(error);

return;

}



console.log("Login correcto:", data);


window.location.href = "panel.html";


};


</script>


</body>
</html>
