<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Leitmix Producciones</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#050505;
color:white;
padding:15px;
margin:0;
}

h1,h2{
color:#f5b400;
}

h1{
text-align:center;
font-size:28px;
}

.card{

background:#151515;

border:1px solid #292929;

padding:20px;

border-radius:18px;

margin-bottom:20px;

box-shadow:0 5px 20px rgba(0,0,0,.5);

}


input,select{

width:100%;

padding:14px;

margin:8px 0;

border-radius:12px;

border:none;

background:#222;

color:white;

font-size:16px;

}


button{
button{
width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
border:none;
background:#f5b400;
color:#000;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:all .25s ease;
}

button:hover{
background:#ffd84d;
transform:translateY(-2px);
box-shadow:0 4px 12px rgba(245,180,0,.35);
}

button:active{
transform:scale(.98);
background:#d89b00;
}

.borrar{
background:#d40000;
color:#fff;
transition:all .25s ease;
}

.borrar:hover{
background:#ff2d2d;
box-shadow:0 4px 12px rgba(255,0,0,.35);
}

.borrar:active{
transform:scale(.98);
}

}


.item{

background:#202020;

padding:18px;

border-radius:15px;

margin-top:15px;

border-left:4px solid #f5b400;

}


.item img{

width:130px;

border-radius:12px;

}


.item video{

width:100%;

max-width:350px;

border-radius:12px;

}







a{

color:#f5b400;

font-weight:bold;

text-decoration:none;

}


h2{

border-bottom:1px solid #333;

padding-bottom:10px;

}


</style>

</head>


<body>


<div class="card">

<h1>🎧 Panel Leitmix Producciones</h1>

</div>



<div class="card">

<h2>🖼️ Subir imagen</h2>

<input id="imagenArchivo" type="file" accept="image/*">

<input id="imagenTitulo" placeholder="Título de la imagen">

<button id="guardarImagen">
Guardar imagen
</button>

</div>



<div class="card">

<h2>🎥 Subir video</h2>

<input id="videoArchivo" type="file" accept="video/*">

<input id="videoTitulo" placeholder="Título del video">

<button id="guardarVideo">
Guardar video
</button>

</div>



<div class="card">

<h2>🖼️ Imágenes subidas</h2>

<div id="listaImagenes"></div>

</div>



<div class="card">

<h2>🎥 Videos subidos</h2>

<div id="listaVideos"></div>

</div>



<div class="card">

<h2>⭐ Testimonios</h2>

<div id="listaTestimonios"></div>

</div>



<div class="card">

<h2>📅 Reservas</h2>

<div id="listaReservas"></div>

</div>



<div class="card">

<h2>🧾 Crear Recibo</h2>


<input id="reciboTotal" placeholder="Total del evento">


<input id="reciboImporte" placeholder="Importe recibido">


<input id="reciboConcepto" placeholder="Concepto (Seña / Pago parcial / Pago total)">


<input id="reciboFormaPago" placeholder="Forma de pago">


<input id="reciboObservaciones" placeholder="Observaciones">


<button id="crearRecibo">
Crear recibo
</button>


</div>



<div class="card">

<h2>🧾 Crear Recibo Manual</h2>


<input id="manualNombre" placeholder="Nombre del cliente">


<input id="manualTelefono" placeholder="Teléfono">


<input id="manualEvento" placeholder="Evento">


<input id="manualFecha" type="date">


<input id="manualTotal" placeholder="Total del evento">


<input id="manualImporte" placeholder="Importe recibido">


<input id="manualConcepto" placeholder="Concepto (Seña / Pago parcial / Pago total)">


<input id="manualFormaPago" placeholder="Forma de pago">


<input id="manualObservaciones" placeholder="Observaciones">



<button id="crearReciboManual">

Crear recibo manual

</button>


</div>



<div class="card">

<h2>🧾 Recibos emitidos</h2>

<div id="listaRecibos"></div>

</div>



<script type="module" src="../admin.js"></script>


</body>
</html>
