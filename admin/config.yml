backend:
  name: github
  repo: leitmixproducciones/leitmix-producciones-web
  branch: master

media_folder: "assets/img"
public_folder: "/assets/img"

collections:

  - name: galeria
    label: Galería
    folder: "content/galeria"
    create: true
    fields:
      - name: title
        label: Título
        widget: string

      - name: image
        label: Imagen
        widget: image

  - name: videos
    label: Videos
    folder: "content/videos"
    create: true
    fields:
      - name: title
        label: Título
        widget: string

      - name: video
        label: Video
        widget: file
