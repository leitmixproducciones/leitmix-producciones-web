<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nueva contraseña - Leitmix Panel</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050505;
font-family:Arial,sans-serif;
color:white;
}

.box{

width:90%;
max-width:350px;
background:#111;
padding:25px;
border-radius:15px;
border:1px solid #f5b400;

}

h2{

text-align:center;
color:#f5b400;

}

input,button{

width:100%;
padding:12px;
margin-top:12px;
border-radius:8px;
box-sizing:border-box;

}

input{

background:#222;
border:1px solid #444;
color:white;

}

button{

background:#f5b400;
border:0;
font-weight:bold;

}

#mensaje{

text-align:center;
color:#f5b400;
margin-top:15px;

}

</style>

</head>


<body>


<div class="box">

<h2>Crear nueva contraseña</h2>


<input 
id="password"
type="password"
placeholder="Nueva contraseña">


<input 
id="confirmar"
type="password"
placeholder="Repetir contraseña">


<button id="guardar">
Guardar contraseña
</button>


<p id="mensaje"></p>


</div>



<script type="module">

import { supabase } from "../supabase.js";


const boton = document.getElementById("guardar");


boton.onclick = async ()=>{


const password =
document.getElementById("password").value;


const confirmar =
document.getElementById("confirmar").value;



if(!password || !confirmar){

document.getElementById("mensaje").textContent =
"Completá los campos";

return;

}



if(password !== confirmar){

document.getElementById("mensaje").textContent =
"Las contraseñas no coinciden";

return;

}



const {error} = await supabase.auth.updateUser({

password: password

});



if(error){

document.getElementById("mensaje").textContent =
error.message;

return;

}



document.getElementById("mensaje").textContent =
"Contraseña cambiada correctamente";


setTimeout(()=>{

window.location.href="login.html";

},2000);



};


</script>


</body>
</html>
